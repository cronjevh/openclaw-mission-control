<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Upper claw arm - the large curved part -->
  <path d="M 20 62
             C 12 48, 14 28, 32 16
             C 48 6, 70 10, 82 26
             C 90 38, 88 56, 76 64
             C 64 72, 48 68, 40 60
             L 48 54
             C 58 60, 70 60, 76 52
             C 82 44, 78 32, 68 26
             C 56 18, 40 22, 34 34
             C 30 42, 34 52, 40 56
             Z"
        fill="#bf1a0d"/>

  <!-- Lower movable jaw -->
  <path d="M 40 60
             C 36 66, 30 72, 30 80
             C 30 86, 38 88, 50 82
             C 62 76, 68 66, 64 58
             C 60 52, 50 50, 44 54
             Z"
        fill="#bf1a0d"/>

  <!-- Dark accent on upper arm for depth -->
  <path d="M 34 34 C 32 44, 36 54, 44 58"
        fill="none" stroke="#8c1008" stroke-width="4" stroke-linecap="round"/>

  <!-- Teeth on upper jaw inner edge -->
  <path d="M 44 58 L 47 51 L 51 57 L 55 50 L 59 56"
        fill="none" stroke="#8c1008" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Knuckle / joint ball -->
  <circle cx="24" cy="68" r="9" fill="#a01209"/>
  <circle cx="24" cy="68" r="5" fill="#bf1a0d"/>
</svg>
